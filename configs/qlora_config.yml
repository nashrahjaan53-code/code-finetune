model_name: "mistralai/Mistral-7B-v0.1"   # open model, no token required

# ── QLoRA (4-bit quantization) ────────────────────────────────────────────────
bnb_config:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"             # NormalFloat4 — best for LLMs
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true        # saves extra memory

# ── LoRA Adapter ──────────────────────────────────────────────────────────────
lora_config:
  r: 64                                  # rank — higher = more capacity
  lora_alpha: 16                         # scaling factor
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:                        # which layers to adapt
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"

# ── Training ──────────────────────────────────────────────────────────────────
training:
  output_dir: "outputs/codellama-qlora"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4        # effective batch = 16
  learning_rate: 2e-4
  max_seq_length: 512
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 25
  save_steps: 100
  eval_steps: 100
  fp16: true
  report_to: "wandb"                    # experiment tracking