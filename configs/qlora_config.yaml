model_name: "Qwen/Qwen2.5-0.5B-Instruct"

bnb_config:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true


lora_config:
  r: 64
  lora_alpha: 16
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"


training:
  output_dir: "outputs/mistral-qlora"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  max_seq_length: 512
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 25
  save_steps: 100
  eval_steps: 100
  fp16: true
  report_to: "wandb"